name: Frontend CI

on:
  push:
    branches: [ "main", "develop" ]
    paths:
      - 'stadiummind-ai/**'
  pull_request:
    branches: [ "main", "develop" ]
    paths:
      - 'stadiummind-ai/**'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./stadiummind-ai

    steps:
    - uses: actions/checkout@v4
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: "20"
        cache: 'npm'
        cache-dependency-path: './stadiummind-ai/package-lock.json'
        
    - name: Install dependencies
      run: npm ci

    - name: Type Check & Lint
      run: |
        npx tsc --noEmit
        npm run lint

    - name: Install Playwright Browsers
      run: npx playwright install --with-deps

    - name: Run Playwright Tests
      run: npx playwright test

    - name: Build Production Next.js App
      run: npm run build
      
    - uses: actions/upload-artifact@v4
      if: always()
      with:
        name: playwright-report
        path: ./stadiummind-ai/playwright-report/
        retention-days: 30
